name: Deploy backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Backend/**"
      - "deploy/Caddyfile"
      - "compose.prod.yml"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.101"

      - name: Test backend
        working-directory: Backend
        run: dotnet test --configuration Release

  deploy:
    name: Deploy backend to production
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Sync backend deployment files
        run: |
          rsync -az \
            --exclude '.git/' \
            --exclude 'bin/' \
            --exclude 'obj/' \
            --exclude 'node_modules/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.PROD_SSH_PORT }}" \
            compose.prod.yml Backend/ deploy/ \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/"

      - name: Configure production telemetry environment
        env:
          GRAFANA_OTLP_ENDPOINT: ${{ secrets.GRAFANA_OTLP_ENDPOINT }}
          GRAFANA_OTLP_HEADERS: ${{ secrets.GRAFANA_OTLP_HEADERS }}
        run: |
          normalize_env_value() {
            key="$1"
            value="$2"
            value="${value#export }"
            value="${value#${key}=}"
            value="${value%\"}"
            value="${value#\"}"
            value="${value%\'}"
            value="${value#\'}"
            printf '%s' "$value"
          }

          otlp_endpoint="$(normalize_env_value OTEL_EXPORTER_OTLP_ENDPOINT "$GRAFANA_OTLP_ENDPOINT")"
          otlp_headers="$(normalize_env_value OTEL_EXPORTER_OTLP_HEADERS "$GRAFANA_OTLP_HEADERS")"

          if [ -z "${otlp_endpoint}" ] || [ -z "${otlp_headers}" ]; then
            echo "::error::Add GRAFANA_OTLP_ENDPOINT and GRAFANA_OTLP_HEADERS repository secrets before deploying."
            exit 1
          fi

          telemetry_env="$(mktemp)"
          trap 'rm -f "$telemetry_env"' EXIT

          {
            printf 'OTEL_SERVICE_NAME=SnakeForTwo.Api\n'
            printf 'OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production,service.namespace=snakefortwo\n'
            printf 'OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf\n'
            printf 'OTEL_EXPORTER_OTLP_ENDPOINT=%s\n' "$otlp_endpoint"
            printf 'OTEL_EXPORTER_OTLP_HEADERS=%s\n' "$otlp_headers"
          } > "$telemetry_env"
          chmod 600 "$telemetry_env"

          scp -i ~/.ssh/deploy_key -P "${{ secrets.PROD_SSH_PORT }}" \
            "$telemetry_env" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/.otel.env"

          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' && sh -s" <<'REMOTE_SCRIPT'
          set -eu
          touch .env
          tmp_env=".env.telemetry.$$"
          awk '!/^(OTEL_SERVICE_NAME|OTEL_RESOURCE_ATTRIBUTES|OTEL_EXPORTER_OTLP_PROTOCOL|OTEL_EXPORTER_OTLP_ENDPOINT|OTEL_EXPORTER_OTLP_HEADERS)=/' .env > "$tmp_env"
          printf '\n' >> "$tmp_env"
          cat .otel.env >> "$tmp_env"
          mv "$tmp_env" .env
          chmod 600 .env
          rm -f .otel.env
          REMOTE_SCRIPT

      - name: Validate production compose config
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' && docker compose --env-file .env -f compose.prod.yml config"

      - name: Rebuild and restart production stack
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' && docker compose --env-file .env -f compose.prod.yml up --build -d"

      - name: Verify production health endpoint
        run: curl --fail --show-error --silent https://api.snakefortwo.com/health
