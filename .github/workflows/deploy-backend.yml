name: Deploy backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Backend/**"
      - "deploy/Caddyfile"
      - "compose.prod.yml"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.101"

      - name: Test backend
        working-directory: Backend
        run: dotnet test --configuration Release

  deploy:
    name: Deploy backend to production
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Sync backend deployment files
        run: |
          rsync -az --checksum \
            --exclude '.git/' \
            --exclude 'bin/' \
            --exclude 'obj/' \
            --exclude 'node_modules/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.PROD_SSH_PORT }}" \
            compose.prod.yml Backend deploy \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/"

      - name: Verify synced telemetry source
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' \
              && grep -n 'AddOpenTelemetry' Backend/src/SnakeForTwo.Api/Program.cs \
              && grep -n 'WithTracing' Backend/src/SnakeForTwo.Api/Program.cs \
              && grep -n 'OpenTelemetry.Exporter.OpenTelemetryProtocol' Backend/src/SnakeForTwo.Api/SnakeForTwo.Api.csproj"

      - name: Configure production application environment
        env:
          BACKEND_DOMAIN: ${{ secrets.PROD_BACKEND_DOMAIN }}
          FRONTEND_ORIGIN: ${{ secrets.PROD_FRONTEND_ORIGIN }}
          FRONTEND_WWW_ORIGIN: ${{ secrets.PROD_FRONTEND_WWW_ORIGIN }}
          POSTGRES_DB: ${{ secrets.PROD_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
          AUTH_SUCCESS_REDIRECT_URI: ${{ secrets.PROD_AUTH_SUCCESS_REDIRECT_URI }}
          AUTH_LOGOUT_REDIRECT_URI: ${{ secrets.PROD_AUTH_LOGOUT_REDIRECT_URI }}
        run: |
          if [ -z "${BACKEND_DOMAIN}" ] || [ -z "${FRONTEND_ORIGIN}" ] || [ -z "${POSTGRES_PASSWORD}" ] || [ -z "${GOOGLE_CLIENT_ID}" ] || [ -z "${GOOGLE_CLIENT_SECRET}" ]; then
            echo "::error::Add PROD_BACKEND_DOMAIN, PROD_FRONTEND_ORIGIN, PROD_POSTGRES_PASSWORD, PROD_GOOGLE_CLIENT_ID, and PROD_GOOGLE_CLIENT_SECRET repository secrets before deploying."
            exit 1
          fi

          app_env="$(mktemp)"
          trap 'rm -f "$app_env"' EXIT

          {
            printf 'BACKEND_DOMAIN=%s\n' "$BACKEND_DOMAIN"
            printf 'FRONTEND_ORIGIN=%s\n' "$FRONTEND_ORIGIN"
            printf 'FRONTEND_WWW_ORIGIN=%s\n' "${FRONTEND_WWW_ORIGIN:-https://www.snakefortwo.com}"
            printf 'PERSISTENCE_ENABLED=true\n'
            printf 'APPLY_MIGRATIONS_ON_STARTUP=true\n'
            printf 'POSTGRES_DB=%s\n' "${POSTGRES_DB:-snakefortwo}"
            printf 'POSTGRES_USER=%s\n' "${POSTGRES_USER:-snakefortwo}"
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD"
            printf 'GOOGLE_CLIENT_ID=%s\n' "$GOOGLE_CLIENT_ID"
            printf 'GOOGLE_CLIENT_SECRET=%s\n' "$GOOGLE_CLIENT_SECRET"
            printf 'AUTH_SUCCESS_REDIRECT_URI=%s\n' "${AUTH_SUCCESS_REDIRECT_URI:-$FRONTEND_ORIGIN}"
            printf 'AUTH_LOGOUT_REDIRECT_URI=%s\n' "${AUTH_LOGOUT_REDIRECT_URI:-$FRONTEND_ORIGIN}"
          } > "$app_env"
          chmod 600 "$app_env"

          scp -i ~/.ssh/deploy_key -P "${{ secrets.PROD_SSH_PORT }}" \
            "$app_env" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/.app.env"

          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' && sh -s" <<'REMOTE_SCRIPT'
          set -eu
          touch .env
          tmp_env=".env.app.$$"
          awk '!/^(BACKEND_DOMAIN|FRONTEND_ORIGIN|FRONTEND_WWW_ORIGIN|PERSISTENCE_ENABLED|APPLY_MIGRATIONS_ON_STARTUP|POSTGRES_DB|POSTGRES_USER|POSTGRES_PASSWORD|GOOGLE_CLIENT_ID|GOOGLE_CLIENT_SECRET|AUTH_SUCCESS_REDIRECT_URI|AUTH_LOGOUT_REDIRECT_URI)=/' .env > "$tmp_env"
          printf '\n' >> "$tmp_env"
          cat .app.env >> "$tmp_env"
          mv "$tmp_env" .env
          chmod 600 .env
          rm -f .app.env
          REMOTE_SCRIPT

      - name: Configure production telemetry environment
        env:
          GRAFANA_OTLP_ENDPOINT: ${{ secrets.GRAFANA_OTLP_ENDPOINT }}
          GRAFANA_OTLP_HEADERS: ${{ secrets.GRAFANA_OTLP_HEADERS }}
        run: |
          normalize_env_value() {
            key="$1"
            value="$2"
            value="${value#export }"
            value="${value#${key}=}"
            value="${value%\"}"
            value="${value#\"}"
            value="${value%\'}"
            value="${value#\'}"
            printf '%s' "$value"
          }

          otlp_endpoint="$(normalize_env_value OTEL_EXPORTER_OTLP_ENDPOINT "$GRAFANA_OTLP_ENDPOINT")"
          otlp_headers="$(normalize_env_value OTEL_EXPORTER_OTLP_HEADERS "$GRAFANA_OTLP_HEADERS")"

          if [ -z "${otlp_endpoint}" ] || [ -z "${otlp_headers}" ]; then
            echo "::error::Add GRAFANA_OTLP_ENDPOINT and GRAFANA_OTLP_HEADERS repository secrets before deploying."
            exit 1
          fi

          telemetry_env="$(mktemp)"
          trap 'rm -f "$telemetry_env"' EXIT

          {
            printf 'OTEL_SERVICE_NAME=SnakeForTwo.Api\n'
            printf 'OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production,service.namespace=snakefortwo\n'
            printf 'OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf\n'
            printf 'OTEL_EXPORTER_OTLP_ENDPOINT=%s\n' "$otlp_endpoint"
            printf 'OTEL_EXPORTER_OTLP_HEADERS=%s\n' "$otlp_headers"
          } > "$telemetry_env"
          chmod 600 "$telemetry_env"

          scp -i ~/.ssh/deploy_key -P "${{ secrets.PROD_SSH_PORT }}" \
            "$telemetry_env" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/.otel.env"

          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' && sh -s" <<'REMOTE_SCRIPT'
          set -eu
          touch .env
          tmp_env=".env.telemetry.$$"
          awk '!/^(OTEL_SERVICE_NAME|OTEL_RESOURCE_ATTRIBUTES|OTEL_EXPORTER_OTLP_PROTOCOL|OTEL_EXPORTER_OTLP_ENDPOINT|OTEL_EXPORTER_OTLP_HEADERS)=/' .env > "$tmp_env"
          printf '\n' >> "$tmp_env"
          cat .otel.env >> "$tmp_env"
          mv "$tmp_env" .env
          chmod 600 .env
          rm -f .otel.env
          REMOTE_SCRIPT

      - name: Validate production compose config
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' && docker compose --env-file .env -f compose.prod.yml config"

      - name: Rebuild and restart production stack
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' && docker compose --env-file .env -f compose.prod.yml up --build -d"

      - name: Ensure auth key volume permissions
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' && docker compose --env-file .env -f compose.prod.yml exec -T -u root backend sh -lc 'chown -R \"\$APP_UID:\$APP_UID\" /var/lib/snakefortwo/data-protection-keys'"

      - name: Verify production telemetry build
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.PROD_SSH_PORT }}" \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "cd '${{ secrets.PROD_DEPLOY_PATH }}' \
              && docker compose --env-file .env -f compose.prod.yml exec -T backend sh -lc \
                \"grep -a 'OpenTelemetry.Exporter.OpenTelemetryProtocol' SnakeForTwo.Api.deps.json >/dev/null \
                  && grep -a 'OpenTelemetry.Instrumentation.AspNetCore' SnakeForTwo.Api.deps.json >/dev/null\""

      - name: Verify production health endpoint
        run: curl --fail --show-error --silent https://api.snakefortwo.com/health
