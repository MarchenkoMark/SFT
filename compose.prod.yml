services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: snake-for-two-backend:prod
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DOTNET_EnableDiagnostics: "1"
      Persistence__Enabled: ${PERSISTENCE_ENABLED:-true}
      Persistence__ApplyMigrationsOnStartup: ${APPLY_MIGRATIONS_ON_STARTUP:-true}
      ConnectionStrings__SnakeForTwo: Host=postgres;Port=5432;Database=${POSTGRES_DB:-snakefortwo};Username=${POSTGRES_USER:-snakefortwo};Password=${POSTGRES_PASSWORD:-snakefortwo_dev_password}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Auth__SuccessRedirectUri: ${AUTH_SUCCESS_REDIRECT_URI:-https://snakefortwo.com}
      Auth__LogoutRedirectUri: ${AUTH_LOGOUT_REDIRECT_URI:-https://snakefortwo.com}
      Auth__DataProtectionKeysPath: /var/lib/snakefortwo/data-protection-keys
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-SnakeForTwo.Api}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=production,service.namespace=snakefortwo}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      Game__TilesPerSecond: "2"
      Game__AnimationFramesPerTile: "5"
      Game__RollbackHistorySeconds: "5"
      Game__InputFutureBufferTicks: "4"
      Game__DisconnectGracePeriodSeconds: "10"
      Game__DisconnectedPlayerRetentionSeconds: "300"
      Game__StartCountdownSeconds: "3"
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-https://snakefortwo.com}
      Cors__AllowedOrigins__1: ${FRONTEND_WWW_ORIGIN:-https://www.snakefortwo.com}
    expose:
      - "8080"
    volumes:
      - auth_data:/var/lib/snakefortwo/data-protection-keys
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-snakefortwo}
      POSTGRES_USER: ${POSTGRES_USER:-snakefortwo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snakefortwo_dev_password}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  auth_data:
  caddy_data:
  caddy_config:
